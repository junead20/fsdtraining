<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Student</title>
</head>
<body>
    <h1>Edit Student</h1>
    <form action="/dashboard.html" method="post">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Junead" required/><br><br>
        <label for="rollno">Roll Number:</label>
        <input type="text" id="rollno" name="rollno" placeholder="1" required/><br><br>
        <label for="grade">Grade:</label>
        <input type="text" id="grade" name="grade" placeholder="A" required/><br><br>
        <input type="submit" value="Update Student"/>
    </form>
</body>
</html>
