<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        #weatherResult {
            margin-top: 20px;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        form {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        input {
            padding: 10px;
            font-size: 16px;
            width: 300px;
            margin-right: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        p {
            font-size: 18px;
            text-align: center;
            color: #555;
        }

        h2 {
            color: #333;
            text-align: center;
        }

        .forecast-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }

        .forecast-card {
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            width: 150px;
        }

        .forecast-card h3 {
            margin: 0 0 10px;
            font-size: 16px;
        }

        body {
            background: linear-gradient(135deg,
                    #4facfe,
                    #00f2fe);
            min-height: 100vh;
        }

        .forecast-card {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(12px);
            color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        h1,
        h2,
        p {
            color: white;
        }
    </style>
</head>

<body>
    <h1>Welcome to the Weather App</h1>
    <p>Get the current weather for your location.</p>
    <form id="weatherForm">
        <input type="text" id="location" placeholder="Enter your location" required>
        <button type="submit">Get Weather</button>
    </form>
    <div id="weatherResult"></div>
    <script>
        document.getElementById('weatherForm').addEventListener('submit', async function (event) {
            event.preventDefault();
            const location = document.getElementById('location').value;
            const weatherResult = document.getElementById('weatherResult');
            const apiKey = 'cf9055700de1031e0719b79dca0f853d';
            try {
                const currentResponse = await fetch(
                    `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(location)}&appid=${apiKey}&units=metric`
                );
                const currentData = await currentResponse.json();
                if (currentData.cod !== 200) {
                    weatherResult.innerHTML = '<p>Location not found. Please try again.</p>';
                    return;
                }
                const forecastResponse = await fetch(
                    `https://api.openweathermap.org/data/2.5/forecast?q=${encodeURIComponent(location)}&appid=${apiKey}&units=metric`
                );

                const forecastData = await forecastResponse.json();
                const dailyForecasts = forecastData.list.filter(item =>
                    item.dt_txt.includes('12:00:00')
                ).slice(0, 5);

                let forecastHTML = `<h2>5-Day Forecast</h2><div class="forecast-container">`;

                dailyForecasts.forEach(day => {
                    forecastHTML += `
                <div class="forecast-card">
                    <h3>${new Date(day.dt_txt).toLocaleDateString(
                            'en-US',
                            {
                                weekday: 'short',
                                month: 'short',
                                day: 'numeric'
                            }
                        )}
                    </h3>
                    <img
                        src="https://openweathermap.org/img/wn/${day.weather[0].icon}@2x.png"
                        alt="${day.weather[0].description}"
                    >
                    <p><strong>${Math.round(day.main.temp)}°C</strong></p>
                    <p>${day.weather[0].description}</p>
                </div>
            `;
                });

                forecastHTML += `</div>`;
                const sunrise = new Date(currentData.sys.sunrise * 1000)
                    .toLocaleTimeString([], {
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                const sunset = new Date(currentData.sys.sunset * 1000)
                    .toLocaleTimeString([], {
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                weatherResult.innerHTML = `
            <h2>Weather in ${currentData.name}, ${currentData.sys.country}</h2>
            <p>Temperature: ${currentData.main.temp}°C</p>
            <p>Description: ${currentData.weather[0].description}</p>
            <p>Humidity: ${currentData.main.humidity}%</p>
            <p>Wind Speed: ${currentData.wind.speed} m/s</p>
            <p>Sunrise: ${sunrise}</p>
            <p>Sunset: ${sunset}</p>
            ${forecastHTML}
        `;

            } catch (error) {
                console.error('Error fetching weather data:', error);
                weatherResult.innerHTML =
                    '<p>Unable to fetch weather data. Please try again later.</p>';
            }
        });
    </script>
</body>

</html>
